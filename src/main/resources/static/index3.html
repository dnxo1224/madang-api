<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>👩‍🎓 고객 조회 (ID 고정)</title>
</head>
<body>
<h2>👩‍🎓 고객 조회 (ID = 3)</h2>

<button onclick="loadCustomer()">고객 3번 불러오기</button>

<ul id="customer-info">
    <!-- 결과 표시 -->
</ul>

<script>
    async function loadCustomer() {
      const response = await fetch('/api/customers/3');
      const customer = await response.json();

      const list = document.getElementById('customer-info');
      list.innerHTML = `
        <li><strong>ID:</strong> ${customer.custid}</li>
        <li><strong>이름:</strong> ${customer.name}</li>
        <li><strong>주소:</strong> ${customer.address}</li>
        <li><strong>전화:</strong> ${customer.phone ?? '없음'}</li>
      `;
    }
</script>
</body>
</html>
