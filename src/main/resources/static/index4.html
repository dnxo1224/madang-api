<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>👩‍🎓 고객 검색</title>
</head>
<body>
<h2>👩‍🎓 고객 ID로 검색</h2>

<form id="searchForm">
    <label for="custId">고객 ID 입력:</label>
    <input type="number" id="custId" required>
    <button type="submit">검색</button>
</form>

<ul id="result">
    <!-- 결과 표시 -->
</ul>

<script>
    document.getElementById('searchForm').addEventListener('submit', async function (event) {
      event.preventDefault(); // 폼의 기본 제출 동작 막기

      const id = document.getElementById('custId').value;
      console.log("입력된 ID:", id);

      try {
        const response = await fetch(`/api/customers/${id}`);
        if (!response.ok) {
          alert("고객을 찾을 수 없습니다.");
          return;
        }

        const customer = await response.json();

        const list = document.getElementById('result');
        list.innerHTML = `
          <li><strong>ID:</strong> ${customer.custid}</li>
          <li><strong>이름:</strong> ${customer.name}</li>
          <li><strong>주소:</strong> ${customer.address}</li>
          <li><strong>전화:</strong> ${customer.phone ?? '없음'}</li>
        `;
      } catch (error) {
        alert("오류 발생: " + error);
        console.error(error);
      }
    });
</script>
</body>
</html>
